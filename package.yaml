name: jbeam-edit-lsp
version: 0.0.1.0
github: webdevred/jbeam-edit-lsp
license: BSD-3-Clause
author: webdevred
maintainer: example@example.com
copyright: 2025 webdevred
language: GHC2021

extra-source-files:
  - README.md

category: Command Line, Jbeam, Beamng, LSP
synopsis: Language server for BeamNG JBeam files, built on jbeam-edit.
description: >-
  jbeam-edit-lsp is a Language Server Protocol implementation for BeamNG JBeam
  files. It reuses the parser and formatter from jbeam-edit to provide
  document formatting over LSP. See the README for usage instructions.

dependencies:
  - base >= 4.20

default-extensions:
  - OverloadedStrings
  - ImportQualifiedPost
  - DerivingStrategies
  - TupleSections

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src
  default-extensions: [DataKinds, PolyKinds]
  dependencies:
    - jbeam-edit
    - aeson
    - bytestring
    - co-log-core
    - containers
    - lsp >= 2.7
    - text

executables:
  jbeam-lsp-server:
    source-dirs: app
    main: Main.hs
    ghc-options: [-threaded, -rtsopts, -with-rtsopts=-N]
    dependencies:
      - jbeam-edit
      - jbeam-edit-lsp
      - filepath >= 1.5.1.0

tests:
  jbeam-edit-lsp-test:
    source-dirs: test
    main: Spec.hs
    ghc-options: [-threaded, -rtsopts, -with-rtsopts=-N]
    build-tools:
      - hspec-discover
      - jbeam-edit-lsp:jbeam-lsp-server
    dependencies:
      - jbeam-edit-lsp
      - filepath >= 1.5.1.0
      - hspec
      - lsp >= 2.7
      - lsp-test
      - text

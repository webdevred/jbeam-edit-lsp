name: Build & test

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: github.event.pull_request.draft != true
    name: Build and test
    runs-on: ubuntu-latest
    env:
      GHC_VERSION: '9.10.3'
    steps:
      - name: Checkout code with submodule
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up GHC and Cabal
        id: setup
        uses: haskell-actions/setup@v2.11.0
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: latest
          cabal-update: true
      - name: Cache Cabal store and build artifacts
        uses: actions/cache@v5.0.5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: >-
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-${{
              hashFiles('jbeam-edit-lsp.cabal', 'external/jbeam-edit/jbeam-edit.cabal')
            }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-
      - name: Build server
        run: cabal build jbeam-edit-lsp:exe:jbeam-lsp-server
      - name: Run tests
        run: cabal test jbeam-edit-lsp:test:jbeam-edit-lsp-test
